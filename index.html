<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panchito Shoes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-dark-app { background-color: #0f172a; }
        .card-dark { background-color: #1e293b; border: 1px solid #334155; }
        .btn-orange { background-color: #f97316; color: white; }
    </style>
</head>
<body class="bg-dark-app text-slate-100 font-sans">

    <!-- CABECERA -->
    <header class="bg-[#1e293b] p-4 border-b border-slate-700 sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="font-bold uppercase tracking-tight">Panchito<span class="text-orange-500">Shoes</span></h1>
            <div class="flex gap-4">
                <button id="nav-carrito" class="relative p-2 bg-slate-800 rounded-full">
                    🛒 <span id="badge" class="absolute -top-1 -right-1 bg-orange-600 text-[10px] rounded-full px-1.5">0</span>
                </button>
                <button id="nav-config" class="text-slate-500">⚙️</button>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        <!-- SECCIÓN: LOGIN -->
        <section id="sec-login" class="mt-10 space-y-6">
            <div class="card-dark p-8 rounded-3xl text-center shadow-2xl">
                <div id="contenedor-logo" class="hidden mb-6">
                    <img id="img-logo" src="" class="w-24 h-24 mx-auto rounded-full border-2 border-orange-500 p-1">
                </div>
                <input type="text" id="input-nombre" placeholder="Ingresa tu nombre" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mb-4 text-white text-center outline-none focus:border-orange-500">
                <button id="btn-entrar" class="w-full btn-orange py-4 rounded-xl font-bold uppercase shadow-lg active:scale-95 transition-transform">Cargar Catálogo</button>
            </div>
        </section>

        <!-- SECCIÓN: CATÁLOGO -->
        <section id="sec-catalogo" class="hidden grid grid-cols-2 gap-4 animate-fade-in"></section>

        <!-- SECCIÓN: CARRITO -->
        <section id="sec-carrito" class="hidden space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">Mi Pedido</h2>
                <button id="btn-cerrar-carrito" class="text-slate-400 text-sm underline">Volver</button>
            </div>
            <div id="lista-pedido" class="space-y-2"></div>
            <button id="btn-enviar-final" class="w-full bg-emerald-600 py-4 rounded-xl font-bold uppercase shadow-lg">Confirmar Pedido</button>
        </section>

        <!-- MODAL SELECCIÓN -->
        <div id="modal-opciones" class="hidden fixed inset-0 bg-black/80 flex items-end z-[100]">
            <div class="bg-[#1e293b] w-full p-6 rounded-t-[2.5rem] space-y-5 shadow-2xl">
                <div class="flex justify-between items-center">
                    <h3 id="modal-titulo" class="text-xl font-black uppercase tracking-tighter text-orange-500">Modelo</h3>
                    <button id="btn-cerrar-modal" class="bg-slate-800 p-2 rounded-full text-slate-400">✕</button>
                </div>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <select id="sel-talla" class="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl text-white"></select>
                        <select id="sel-color" class="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl text-white"></select>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Cantidad de pares</label>
                        <input type="number" id="sel-cant" value="1" min="1" class="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl text-center text-orange-500 font-bold text-xl">
                    </div>
                    <button id="btn-confirmar-add" class="w-full btn-orange py-4 rounded-2xl font-bold uppercase shadow-xl">Añadir al Carrito</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ESTADO DE LA APP[cite: 2]
        var inventarioGlobal = {};
        var carritoActual = [];
        var modeloEnSeleccion = "";

        // CONFIGURACIÓN (ENGRANAJE)
        document.getElementById('nav-config').onclick = function() {
            var clave = prompt("Clave de acceso:");
            if(clave === "1234") {
                var urlActual = localStorage.getItem('panchito_url') || "";
                var nuevaUrl = prompt("Pega la URL de tu Google Script:", urlActual);
                if(nuevaUrl) {
                    localStorage.setItem('panchito_url', nuevaUrl.trim());
                    location.reload();
                }
            }
        };

        // INICIO DE SESIÓN Y CARGA DE DATOS
        document.getElementById('btn-entrar').onclick = async function() {
            var nombre = document.getElementById('input-nombre').value.trim();
            var scriptUrl = localStorage.getItem('panchito_url');

            if(!nombre) return alert("Por favor escribe tu nombre.");
            if(!scriptUrl) return alert("Configura la URL en el engranaje ⚙️ primero.");

            this.innerText = "CONECTANDO...";
            this.disabled = true;

            try {
                var respuesta = await fetch(scriptUrl);
                var datos = await respuesta.json();
                inventarioGlobal = datos.inventario;[cite: 1, 2]

                // Mostrar logo si existe
                if(datos.visuales && datos.visuales.logo) {
                    document.getElementById('img-logo').src = datos.visuales.logo;
                    document.getElementById('contenedor-logo').classList.remove('hidden');
                }

                // Construir catálogo
                var grid = document.getElementById('sec-catalogo');
                grid.innerHTML = "";
                
                Object.keys(inventarioGlobal).forEach(function(nombreItem) {
                    var card = document.createElement('div');
                    card.className = "card-dark p-2 rounded-2xl cursor-pointer active:scale-95 transition-transform";
                    card.innerHTML = '<img src="'+inventarioGlobal[nombreItem].foto+'" class="w-full h-32 object-cover rounded-xl mb-2">' +
                                     '<p class="text-[10px] font-bold text-center uppercase truncate px-1">'+nombreItem+'</p>';
                    card.onclick = function() { abrirSeleccion(nombreItem); };
                    grid.appendChild(card);
                });[cite: 2]

                document.getElementById('sec-login').classList.add('hidden');
                document.getElementById('sec-catalogo').classList.remove('hidden');
            } catch(e) {
                alert("Error: No se pudo conectar. Revisa la URL del Script.");
                this.innerText = "Cargar Catálogo";
                this.disabled = false;
            }
        };

        // LÓGICA DEL MODAL
        function abrirSeleccion(nombre) {
            modeloEnSeleccion = nombre;
            document.getElementById('modal-titulo').innerText = nombre;
            
            var tSel = document.getElementById('sel-talla');
            tSel.innerHTML = inventarioGlobal[nombre].tallas.map(function(t) { return '<option>'+t+'</option>'; }).join('');
            
            var cSel = document.getElementById('sel-color');
            cSel.innerHTML = inventarioGlobal[nombre].colores.map(function(c) { return '<option>'+c+'</option>'; }).join('');
            
            document.getElementById('modal-opciones').classList.remove('hidden');
        }

        document.getElementById('btn-cerrar-modal').onclick = function() {
            document.getElementById('modal-opciones').classList.add('hidden');
        };

        document.getElementById('btn-confirmar-add').onclick = function() {
            carritoActual.push({
                m: modeloEnSeleccion,
                t: document.getElementById('sel-talla').value,
                c: document.getElementById('sel-color').value,
                n: document.getElementById('sel-cant').value,
                tipo: "Normal",
                img: inventarioGlobal[modeloEnSeleccion].foto
            });
            document.getElementById('badge').innerText = carritoActual.length;
            document.getElementById('modal-opciones').classList.add('hidden');
            alert("Añadido correctamente");
        };

        // LÓGICA DEL CARRITO
        document.getElementById('nav-carrito').onclick = function() {
            if(carritoActual.length === 0) return alert("Tu carrito está vacío.");
            
            document.getElementById('sec-catalogo').classList.add('hidden');
            document.getElementById('sec-carrito').classList.remove('hidden');
            
            var lista = document.getElementById('lista-pedido');
            lista.innerHTML = "";
            
            carritoActual.forEach(function(item, index) {
                var fila = document.createElement('div');
                fila.className = "bg-slate-900 p-4 rounded-2xl flex justify-between items-center border border-slate-800";
                fila.innerHTML = '<div><p class="font-black text-xs uppercase">'+item.m+'</p>' +
                                 '<p class="text-[10px] text-slate-400">Talla '+item.t+' | '+item.c+' | '+item.n+' pares</p></div>';
                
                var btnBorrar = document.createElement('button');
                btnBorrar.innerHTML = "✕";
                btnBorrar.className = "text-red-500 font-bold px-3";
                btnBorrar.onclick = function() {
                    carritoActual.splice(index, 1);
                    document.getElementById('badge').innerText = carritoActual.length;
                    if(carritoActual.length === 0) cerrarCarrito(); else document.getElementById('nav-carrito').onclick();
                };
                
                fila.appendChild(btnBorrar);
                lista.appendChild(fila);
            });
        };

        function cerrarCarrito() {
            document.getElementById('sec-carrito').classList.add('hidden');
            document.getElementById('sec-catalogo').classList.remove('hidden');
        }
        document.getElementById('btn-cerrar-carrito').onclick = cerrarCarrito;

        // ENVIAR A GOOGLE SHEETS
        document.getElementById('btn-enviar-final').onclick = async function() {
            var urlPost = localStorage.getItem('panchito_url');
            this.innerText = "ENVIANDO...";
            this.disabled = true;

            try {
                await fetch(urlPost, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        vendedor: document.getElementById('input-nombre').value,
                        carrito: carritoActual
                    })
                });[cite: 1, 2]
                alert("¡PEDIDO REGISTRADO EXITOSAMENTE!");
                location.reload();
            } catch(e) {
                alert("Error al enviar el pedido.");
                this.innerText = "Confirmar Pedido";
                this.disabled = false;
            }
        };
    </script>
</body>
</html>
