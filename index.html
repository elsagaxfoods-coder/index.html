<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panchito Shoes - Pedidos</title>
    
    <!-- CONFIGURACIÓN PWA (MODO APP) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196F3">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        :root { --primary: #2196F3; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #1a1a1a; margin-bottom: 25px; font-size: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #444; }
        input, select, textarea { width: 100%; padding: 14px; border: 1.5px solid #e0e0e0; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; transition: border-color 0.3s; background: #fafafa; }
        input:focus, select:focus { border-color: var(--primary); background: #fff; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3); transition: all 0.2s; }
        button:active { transform: scale(0.97); background: #1976D2; }
        button:disabled { background: #bdbdbd; box-shadow: none; }
        .status-bar { display: none; text-align: center; padding: 14px; margin-top: 15px; border-radius: 12px; font-size: 14px; font-weight: bold; animation: fadeIn 0.3s; }
        .success { display: block; background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <h2>👟 Panchito Shoes</h2>
    
    <div class="form-group">
        <label>Vendedor</label>
        <input type="text" id="vendedor" placeholder="Tu nombre o ID">
    </div>

    <div class="form-group">
        <label>Tipo de Calzado</label>
        <select id="tipo">
            <option value="Sandalia">Sandalia</option>
            <option value="Bota">Bota</option>
            <option value="Zapato">Zapato</option>
            <option value="Tenis">Tenis</option>
            <option value="Otro">Otro</option>
        </select>
    </div>

    <div class="form-group">
        <label>Modelo / Referencia</label>
        <input type="text" id="modelo" placeholder="Nombre del modelo">
    </div>

    <div style="display: flex; gap: 12px;">
        <div class="form-group" style="flex: 1;">
            <label>Talla</label>
            <input type="number" id="talla" placeholder="26">
        </div>
        <div class="form-group" style="flex: 1.5;">
            <label>Color</label>
            <input type="text" id="color" placeholder="Ej: Negro">
        </div>
    </div>

    <div class="form-group">
        <label>Notas Adicionales</label>
        <textarea id="notas" rows="2" placeholder="Especificaciones del cliente..."></textarea>
    </div>

    <button id="btnEnviar" onclick="enviarPedido()">ENVIAR PEDIDO</button>

    <div id="status" class="status-bar"></div>
</div>

<script>
    // URL DE TU SCRIPT DE GOOGLE
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwc2fCBRlPx15h2tjqSKXiTSag0B6NF6xihgyUCESy0BNfP0Z_1_d7CItubZd9f4PHL/exec";

    async function enviarPedido() {
        const btn = document.getElementById('btnEnviar');
        const status = document.getElementById('status');
        
        const payload = {
            vendedor: document.getElementById('vendedor').value,
            carrito: [{
                tipo: document.getElementById('tipo').value,
                m: document.getElementById('modelo').value,
                t: document.getElementById('talla').value,
                c: document.getElementById('color').value,
                n: document.getElementById('notas').value
            }]
        };

        if (!payload.vendedor || !payload.carrito[0].m || !payload.carrito[0].t) {
            alert("Completa Vendedor, Modelo y Talla para continuar.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Procesando...";

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            // Éxito visual
            status.innerText = "¡Pedido enviado a la hoja! ✅";
            status.className = "status-bar success";
            
            // Limpieza selectiva
            document.getElementById('modelo').value = "";
            document.getElementById('talla').value = "";
            document.getElementById('color').value = "";
            document.getElementById('notas').value = "";

        } catch (error) {
            console.error(error);
            alert("Error de conexión. Revisa tu internet.");
        } finally {
            btn.disabled = false;
            btn.innerText = "ENVIAR PEDIDO";
            setTimeout(() => { 
                status.className = "status-bar"; 
                status.innerText = ""; 
            }, 4500);
        }
    }

    // ACTIVADOR DE INSTALACIÓN (SERVICE WORKER)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('Sistema de App Activo');
            });
        });
    }
</script>

</body>
</html>
