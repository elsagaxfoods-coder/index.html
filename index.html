<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panchito Shoes Sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">

    <header class="p-4 bg-slate-800 flex justify-between items-center border-b border-slate-700">
        <h1 class="font-bold uppercase text-orange-500">Panchito Shoes</h1>
        <div class="flex gap-4">
            <button id="btn-cart" class="bg-slate-700 p-2 rounded-full relative">🛒 <span id="count" class="font-bold">0</span></button>
            <button id="btn-cfg" class="text-slate-500">⚙️</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <!-- VISTA 1: ACCESO -->
        <div id="view-login" class="mt-10 space-y-4">
            <input type="text" id="user-name" placeholder="Tu Nombre de Vendedor" class="w-full p-4 bg-slate-800 rounded-xl border border-slate-700 outline-none">
            <button id="btn-start" class="w-full bg-orange-600 p-4 rounded-xl font-bold uppercase shadow-lg">Entrar al Sistema</button>
        </div>

        <!-- VISTA 2: CATALOGO -->
        <div id="view-catalog" class="hidden grid grid-cols-2 gap-4"></div>

        <!-- VISTA 3: CARRITO -->
        <div id="view-cart" class="hidden space-y-4">
            <h2 class="text-xl font-bold">Resumen de Pedido</h2>
            <div id="cart-items" class="space-y-2"></div>
            <button id="btn-send" class="w-full bg-green-600 p-4 rounded-xl font-bold uppercase">Confirmar y Enviar</button>
            <button id="btn-back" class="w-full text-slate-500 py-2">Regresar al catálogo</button>
        </div>

        <!-- MODAL: OPCIONES -->
        <div id="modal-box" class="hidden fixed inset-0 bg-black/90 flex items-end z-50">
            <div class="bg-slate-800 w-full p-6 rounded-t-3xl space-y-4">
                <h3 id="modal-title" class="text-xl font-bold text-orange-500 uppercase"></h3>
                <label class="block text-xs text-slate-400">Talla:</label>
                <select id="sel-t" class="w-full p-3 bg-slate-900 rounded border border-slate-700"></select>
                <label class="block text-xs text-slate-400">Color:</label>
                <select id="sel-c" class="w-full p-3 bg-slate-900 rounded border border-slate-700"></select>
                <label class="block text-xs text-slate-400">Cantidad:</label>
                <input type="number" id="sel-n" value="1" min="1" class="w-full p-3 bg-slate-900 rounded text-center text-orange-500 font-bold">
                <button id="btn-add-item" class="w-full bg-orange-600 p-4 rounded-xl font-bold uppercase">Agregar al carrito</button>
                <button id="btn-close-modal" class="w-full text-slate-400 py-2">Cancelar</button>
            </div>
        </div>
    </main>

    <script>
        // Variables globales sin sintaxis compleja
        var globalData = {};
        var globalCart = [];
        var activeModel = "";

        // 1. Configuración de URL
        document.getElementById('btn-cfg').onclick = function() {
            var pass = prompt("Clave:");
            if (pass === "1234") {
                var current = localStorage.getItem('ps_url_v2') || "";
                var link = prompt("Pega la URL del Script (terminada en /exec):", current);
                if (link) {
                    localStorage.setItem('ps_url_v2', link.trim());
                    location.reload();
                }
            }
        };

        // 2. Cargar Catálogo
        document.getElementById('btn-start').onclick = function() {
            var user = document.getElementById('user-name').value;
            var url = localStorage.getItem('ps_url_v2');
            if (!user) return alert("Escribe tu nombre");
            if (!url) return alert("Configura la URL en el engranaje ⚙️");

            var btn = this;
            btn.innerText = "CARGANDO...";
            btn.disabled = true;

            fetch(url)
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    globalData = data.inventario;[cite: 1, 2]
                    var grid = document.getElementById('view-catalog');
                    grid.innerHTML = "";
                    
                    Object.keys(globalData).forEach(function(key) {
                        var card = document.createElement('div');
                        card.className = "bg-slate-800 p-2 rounded-xl border border-slate-700 text-center";
                        card.innerHTML = '<img src="' + globalData[key].foto + '" class="h-32 w-full object-cover rounded-lg mb-2"><p class="text-[10px] font-bold uppercase">' + key + '</p>';
                        card.onclick = function() { 
                            activeModel = key;
                            document.getElementById('modal-title').innerText = key;
                            document.getElementById('sel-t').innerHTML = globalData[key].tallas.map(function(t){ return '<option>'+t+'</option>'; }).join('');
                            document.getElementById('sel-c').innerHTML = globalData[key].colores.map(function(c){ return '<option>'+c+'</option>'; }).join('');
                            document.getElementById('modal-box').classList.remove('hidden');
                        };
                        grid.appendChild(card);
                    });[cite: 2]

                    document.getElementById('view-login').classList.add('hidden');
                    document.getElementById('view-catalog').classList.remove('hidden');
                })
                .catch(function(err) {
                    alert("Error al conectar con la base de datos: " + err);
                    btn.innerText = "Entrar al Sistema";
                    btn.disabled = false;
                });
        };

        // 3. Carrito y Modal
        document.getElementById('btn-close-modal').onclick = function() { document.getElementById('modal-box').classList.add('hidden'); };

        document.getElementById('btn-add-item').onclick = function() {
            globalCart.push({
                m: activeModel,
                t: document.getElementById('sel-t').value,
                c: document.getElementById('sel-c').value,
                n: document.getElementById('sel-n').value,
                tipo: "Normal",
                img: globalData[activeModel].foto
            });
            document.getElementById('count').innerText = globalCart.length;
            document.getElementById('modal-box').classList.add('hidden');
        };

        document.getElementById('btn-cart').onclick = function() {
            if (globalCart.length === 0) return alert("El carrito está vacío");
            document.getElementById('view-catalog').classList.add('hidden');
            document.getElementById('view-cart').classList.remove('hidden');
            
            var list = document.getElementById('cart-items');
            list.innerHTML = "";
            globalCart.forEach(function(item, idx) {
                var div = document.createElement('div');
                div.className = "bg-slate-800 p-3 rounded-lg border border-slate-700 flex justify-between";
                div.innerHTML = '<div><p class="text-xs font-bold uppercase">' + item.m + '</p><p class="text-[10px] text-slate-400">Talla ' + item.t + ' | ' + item.n + ' pares</p></div>';
                var del = document.createElement('button');
                del.innerText = "ELIMINAR";
                del.className = "text-red-500 text-[10px] font-bold";
                del.onclick = function() {
                    globalCart.splice(idx, 1);
                    document.getElementById('count').innerText = globalCart.length;
                    if (globalCart.length === 0) {
                        document.getElementById('view-cart').classList.add('hidden');
                        document.getElementById('view-catalog').classList.remove('hidden');
                    } else {
                        document.getElementById('btn-cart').onclick();
                    }
                };
                div.appendChild(del);
                list.appendChild(div);
            });
        };

        document.getElementById('btn-back').onclick = function() {
            document.getElementById('view-cart').classList.add('hidden');
            document.getElementById('view-catalog').classList.remove('hidden');
        };

        // 4. Enviar Pedido Final
        document.getElementById('btn-send').onclick = function() {
            var url = localStorage.getItem('ps_url_v2');
            var btn = this;
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            fetch(url, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    vendedor: document.getElementById('user-name').value,
                    carrito: globalCart
                })
            }).then(function() {
                alert("PEDIDO REGISTRADO EN GOOGLE SHEETS");
                location.reload();
            }).catch(function(err) {
                alert("Error al enviar: " + err);
                btn.innerText = "Confirmar y Enviar";
                btn.disabled = false;
            });[cite: 1, 2]
        };
    </script>
</body>
</html>
