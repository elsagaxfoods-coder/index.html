<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panchito Shoes App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .logo-img { width: 45px; height: 45px; object-fit: cover; border-radius: 50%; border: 2px solid #2563eb; }
        .banner-img { width: 100%; height: 140px; object-fit: cover; border-radius: 15px; margin-bottom: 20px; display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <!-- BARRA SUPERIOR FIJA -->
    <header class="bg-white shadow-sm sticky top-0 z-50 p-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img id="app-logo" src="" class="logo-img hidden" alt="Logo">
                <h1 class="font-black text-xl tracking-tighter text-blue-600">PANCHITO<span class="text-slate-400 font-light italic text-sm ml-1">SHOES</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="verCarrito()" class="relative p-2 bg-slate-100 rounded-full hover:bg-blue-100 transition-colors">
                    <span class="text-xl">🛒</span>
                    <span id="badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center border-2 border-white">0</span>
                </button>
                <button onclick="config()" class="text-slate-300 hover:text-slate-600">⚙️</button>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-24">

        <!-- PANTALLA: LOGIN -->
        <section id="p-login" class="fade-in mt-10">
            <div class="bg-white rounded-3xl p-8 shadow-xl border border-slate-100 text-center">
                <img id="login-logo" src="" class="w-24 h-24 mx-auto rounded-full mb-6 hidden shadow-md">
                <h2 class="text-2xl font-bold mb-2">¡Hola!</h2>
                <p class="text-slate-400 text-sm mb-8">Ingresa tu nombre para comenzar a vender.</p>
                <input type="text" id="user" placeholder="Nombre del Vendedor" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl mb-4 outline-none focus:border-blue-500 focus:bg-white transition-all">
                <button onclick="init()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 active:scale-95 transition-transform">ENTRAR AL SISTEMA</button>
            </div>
        </section>

        <!-- PANTALLA: CATALOGO -->
        <section id="p-catalogo" class="hidden fade-in">
            <img id="app-banner" src="" class="banner-img shadow-lg" alt="Promoción">
            
            <div class="bg-white rounded-3xl p-6 shadow-md border border-slate-100 mb-6">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Selección de Calzado</label>
                <select id="sel-modelo" onchange="loadOptions()" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500">
                    <option value="">-- Elige un modelo --</option>
                </select>

                <div id="options-area" class="hidden mt-6 pt-6 border-t border-slate-50 space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <span class="text-[10px] font-bold text-slate-400 uppercase ml-2">Talla</span>
                            <select id="sel-talla" class="w-full p-3 bg-slate-50 border rounded-xl"></select>
                        </div>
                        <div>
                            <span class="text-[10px] font-bold text-slate-400 uppercase ml-2">Color</span>
                            <select id="sel-color" class="w-full p-3 bg-slate-50 border rounded-xl"></select>
                        </div>
                    </div>
                    <div>
                        <span class="text-[10px] font-bold text-slate-400 uppercase ml-2">Cantidad</span>
                        <input type="number" id="sel-cant" value="1" min="1" class="w-full p-3 bg-slate-50 border rounded-xl font-bold">
                    </div>
                    <button onclick="addToCart()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">AÑADIR AL CARRITO</button>
                </div>
            </div>
        </section>

        <!-- PANTALLA: CARRITO -->
        <section id="p-carrito" class="hidden fade-in">
            <div class="bg-white rounded-3xl p-6 shadow-xl border border-slate-100 flex flex-col min-h-[400px]">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black">RESUMEN</h2>
                    <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-bold" id="res-vendedor"></span>
                </div>
                <div id="cart-list" class="flex-grow space-y-3 overflow-y-auto max-h-[350px]"></div>
                <div class="mt-8 space-y-3">
                    <button onclick="sendOrder()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold text-lg shadow-lg">CONFIRMAR PEDIDO</button>
                    <button onclick="back()" class="w-full text-slate-400 font-bold py-2">← Seguir eligiendo</button>
                </div>
            </div>
        </section>

    </main>

    <script>
        let scriptURL = localStorage.getItem('panchito_url') || "";
        let db = {};
        let cart = [];

        function init() {
            const user = document.getElementById('user').value;
            if(!user) return alert("Escribe tu nombre");
            if(!scriptURL) return alert("Falta configurar la URL (Click en ⚙️)");

            fetch(scriptURL)
                .then(r => r.json())
                .then(data => {
                    db = data.inventario;
                    
                    // Cargar Imágenes
                    if(data.visuales.logo) {
                        document.getElementById('app-logo').src = data.visuales.logo;
                        document.getElementById('app-logo').classList.remove('hidden');
                        document.getElementById('login-logo').src = data.visuales.logo;
                        document.getElementById('login-logo').classList.remove('hidden');
                    }
                    if(data.visuales.banner) {
                        document.getElementById('app-banner').src = data.visuales.banner;
                        document.getElementById('app-banner').style.display = 'block';
                    }

                    // Cargar Modelos
                    const sel = document.getElementById('sel-modelo');
                    sel.innerHTML = '<option value="">-- Elige un modelo --</option>';
                    Object.keys(db).forEach(m => sel.innerHTML += `<option value="${m}">${m}</option>`);

                    document.getElementById('res-vendedor').innerText = user;
                    document.getElementById('p-login').classList.add('hidden');
                    document.getElementById('p-catalogo').classList.remove('hidden');
                })
                .catch(() => alert("Error de conexión. Revisa tu URL de Google Script."));
        }

        function loadOptions() {
            const mod = document.getElementById('sel-modelo').value;
            const area = document.getElementById('options-area');
            if(!mod) return area.classList.add('hidden');

            const info = db[mod];
            document.getElementById('sel-talla').innerHTML = info.tallas.map(t => `<option>${t}</option>`).join('');
            document.getElementById('sel-color').innerHTML = info.colores.map(c => `<option>${c}</option>`).join('');
            area.classList.remove('hidden');
        }

        function addToCart() {
            const m = document.getElementById('sel-modelo').value;
            const t = document.getElementById('sel-talla').value;
            const c = document.getElementById('sel-color').value;
            const n = document.getElementById('sel-cant').value;

            cart.push({m, t, c, n});
            document.getElementById('badge').innerText = cart.length;
            
            // Reset
            document.getElementById('sel-modelo').value = "";
            document.getElementById('options-area').classList.add('hidden');
            alert("Añadido con éxito");
        }

        function verCarrito() {
            if(cart.length === 0) return alert("El carrito está vacío");
            document.getElementById('p-catalogo').classList.add('hidden');
            document.getElementById('p-carrito').classList.remove('hidden');
            
            document.getElementById('cart-list').innerHTML = cart.map((i, idx) => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <div>
                        <p class="font-bold text-sm">${i.m}</p>
                        <p class="text-[10px] text-slate-400">Talla: ${i.t} | Color: ${i.c} | Cant: ${i.n}</p>
                    </div>
                    <button onclick="remove(${idx})" class="text-red-400 hover:text-red-600">Eliminar</button>
                </div>
            `).join('');
        }

        function remove(idx) {
            cart.splice(idx, 1);
            document.getElementById('badge').innerText = cart.length;
            if(cart.length === 0) back(); else verCarrito();
        }

        function back() {
            document.getElementById('p-carrito').classList.add('hidden');
            document.getElementById('p-catalogo').classList.remove('hidden');
        }

        function config() {
            const pass = prompt("Clave:");
            if(pass === "1234") {
                const u = prompt("URL de Google Script:", scriptURL);
                if(u) {
                    localStorage.setItem('panchito_url', u.trim());
                    location.reload();
                }
            }
        }

        async function sendOrder() {
            const v = document.getElementById('user').value;
            try {
                await fetch(scriptURL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({vendedor: v, carrito: cart})
                });
                alert("PEDIDO ENVIADO AL EXCEL");
                location.reload();
            } catch(e) {
                alert("Error al enviar");
            }
        }
    </script>
</body>
</html>
