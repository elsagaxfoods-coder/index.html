<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panchito Shoes - Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-dark-app { background-color: #0f172a; }
        .card-dark { background-color: #1e293b; border: 1px solid #334155; }
        .btn-orange { background-color: #f97316; color: white; }
        .model-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 12px; }
    </style>
</head>
<body class="bg-dark-app text-slate-100">

    <header class="bg-[#1e293b] p-4 border-b border-slate-700 sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="font-black text-lg uppercase">Panchito<span class="text-orange-500">Shoes</span></h1>
            <div class="flex gap-3">
                <button onclick="verCarrito()" class="relative p-2 bg-slate-800 rounded-full">
                    🛒 <span id="badge" class="absolute -top-1 -right-1 bg-orange-500 text-[10px] rounded-full h-5 w-5 flex items-center justify-center">0</span>
                </button>
                <button onclick="config()" class="text-slate-500">⚙️</button>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        <!-- SECCIÓN LOGIN -->
        <section id="p-login" class="mt-10">
            <div class="card-dark rounded-3xl p-8 text-center">
                <img id="login-logo" src="" class="w-20 h-20 mx-auto rounded-full mb-4 hidden border-2 border-orange-500">
                <input type="text" id="user" placeholder="Nombre Vendedor" class="w-full bg-slate-900 border-2 border-slate-700 p-4 rounded-xl mb-4 text-white text-center outline-none focus:border-orange-500">
                <button onclick="init()" id="btn-init" class="w-full btn-orange py-4 rounded-xl font-bold uppercase shadow-lg">INGRESAR AL CATÁLOGO</button>
            </div>
        </section>

        <!-- SECCIÓN CATÁLOGO -->
        <section id="p-catalogo" class="hidden">
            <h2 class="text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest">Modelos Disponibles</h2>
            <div id="grid-modelos" class="grid grid-cols-2 gap-4"></div>
        </section>

        <!-- SECCIÓN CONFIGURADOR (MODAL) -->
        <section id="p-config" class="hidden fixed inset-0 bg-slate-950/90 z-[60] flex items-end">
            <div class="w-full bg-[#1e293b] rounded-t-[3rem] p-6 max-h-[90vh] overflow-y-auto">
                <div class="flex justify-between items-start mb-4">
                    <h2 id="conf-nombre" class="text-xl font-black uppercase">Modelo</h2>
                    <button onclick="cerrarConfig()" class="bg-slate-800 p-2 rounded-full text-slate-400">✕</button>
                </div>
                <img id="conf-img" src="" class="w-full h-52 object-cover rounded-2xl mb-6 border-2 border-slate-700 shadow-2xl">
                <div class="space-y-4">
                    <div>
                        <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Tipo de calzado</p>
                        <div class="flex bg-slate-900 p-1 rounded-lg border border-slate-700">
                            <button onclick="setTipo('Normal')" id="btn-normal" class="flex-1 py-2 rounded-md bg-orange-500 text-xs font-bold">NORMAL</button>
                            <button onclick="setTipo('Personalizado')" id="btn-perso" class="flex-1 py-2 text-xs text-slate-500 font-bold">PERSONALIZADO</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Talla</p>
                            <select id="sel-talla" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-lg text-white"></select>
                        </div>
                        <div>
                            <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Color</p>
                            <select id="sel-color" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-lg text-white"></select>
                        </div>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Cantidad</p>
                        <input type="number" id="sel-cant" value="1" min="1" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-lg text-center text-orange-500 font-bold text-xl">
                    </div>
                    <button onclick="addToCart()" class="w-full btn-orange py-4 rounded-2xl font-bold shadow-xl">AGREGAR AL PEDIDO</button>
                </div>
            </div>
        </section>

        <!-- SECCIÓN CARRITO -->
        <section id="p-carrito" class="hidden">
            <div class="card-dark rounded-3xl p-6">
                <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
                    <h2 class="font-bold uppercase">Tu Pedido</h2>
                    <button onclick="back()" class="text-xs text-slate-500">← Seguir</button>
                </div>
                <div id="cart-list" class="space-y-3 mb-6"></div>
                <button onclick="sendOrder()" id="btn-send" class="w-full bg-emerald-600 py-4 rounded-xl font-bold text-white shadow-lg">ENVIAR A PRODUCCIÓN</button>
            </div>
        </section>
    </main>

    <script>
        // Variables Globales
        let scriptURL = localStorage.getItem('panchito_url') || "";
        let db = {}; 
        let cart = []; 
        let tipoActual = "Normal"; 
        let modeloSeleccionado = "";

        // FUNCIÓN PRINCIPAL DE ENTRADA
        async function init() {
            const userField = document.getElementById('user');
            const userName = userField ? userField.value.trim() : "";
            
            if(!userName || !scriptURL) {
                alert("Por favor ingresa tu nombre y configura la URL en el engranaje ⚙️");
                return;
            }

            document.getElementById('btn-init').innerText = "CONECTANDO...";
            
            try {
                const response = await fetch(scriptURL);
                const data = await response.json();
                db = data.inventario;[cite: 1, 2]
                
                if(data.visuales && data.visuales.logo) { 
                    const imgLogo = document.getElementById('login-logo');
                    imgLogo.src = data.visuales.logo; 
                    imgLogo.classList.remove('hidden'); 
                }
                
                const grid = document.getElementById('grid-modelos');
                grid.innerHTML = "";
                
                Object.keys(db).forEach(m => {
                    grid.innerHTML += `
                        <div onclick="abrirConfig('${m}')" class="card-dark p-2 rounded-2xl model-card cursor-pointer">
                            <img src="${db[m].foto || 'https://via.placeholder.com/150'}" alt="${m}">
                            <p class="text-[10px] font-bold mt-2 uppercase text-center truncate">${m}</p>
                        </div>
                    `;
                });[cite: 2]
                
                document.getElementById('p-login').classList.add('hidden');
                document.getElementById('p-catalogo').classList.remove('hidden');
            } catch(e) {
                console.error(e);
                alert("Error: No se pudo cargar el inventario. Revisa la URL del Script.");
                document.getElementById('btn-init').innerText = "INGRESAR AL CATÁLOGO";
            }
        }

        // FUNCIONES DE INTERFAZ
        function abrirConfig(m) {
            modeloSeleccionado = m;
            document.getElementById('conf-nombre').innerText = m;
            document.getElementById('conf-img').src = db[m].foto || 'https://via.placeholder.com/200';
            document.getElementById('sel-talla').innerHTML = db[m].tallas.map(t => `<option>${t}</option>`).join('');
            document.getElementById('sel-color').innerHTML = db[m].colores.map(c => `<option>${c}</option>`).join('');
            document.getElementById('p-config').classList.remove('hidden');
        }

        function cerrarConfig() { document.getElementById('p-config').classList.add('hidden'); }

        function setTipo(t) {
            tipoActual = t;
            document.getElementById('btn-normal').className = t==='Normal' ? "flex-1 py-2 rounded-md bg-orange-500 text-xs font-bold" : "flex-1 py-2 text-xs text-slate-500 font-bold";
            document.getElementById('btn-perso').className = t==='Personalizado' ? "flex-1 py-2 rounded-md bg-orange-500 text-xs font-bold" : "flex-1 py-2 text-xs text-slate-500 font-bold";
        }

        function addToCart() {
            cart.push({ 
                m: modeloSeleccionado, 
                t: document.getElementById('sel-talla').value, 
                c: document.getElementById('sel-color').value, 
                n: document.getElementById('sel-cant').value, 
                tipo: tipoActual,
                img: db[modeloSeleccionado].foto || "" 
            });
            document.getElementById('badge').innerText = cart.length;
            cerrarConfig();
            alert("Añadido al pedido");
        }

        function verCarrito() {
            if(cart.length === 0) return alert("El pedido está vacío");
            document.getElementById('p-catalogo').classList.add('hidden');
            document.getElementById('p-carrito').classList.remove('hidden');
            document.getElementById('cart-list').innerHTML = cart.map((i, idx) => `
                <div class="bg-slate-900 p-3 rounded-2xl flex items-center gap-4 border border-slate-800">
                    <img src="${i.img || 'https://via.placeholder.com/50'}" class="w-14 h-14 rounded-lg object-cover">
                    <div class="flex-1">
                        <p class="text-xs font-black uppercase">${i.m} <span class="text-orange-500 text-[9px]">[${i.tipo}]</span></p>
                        <p class="text-[10px] text-slate-400">Talla: ${i.t} | Color: ${i.c}</p>
                        <p class="text-xs font-bold text-orange-500">${i.n} pares</p>
                    </div>
                    <button onclick="remove(${idx})" class="text-red-500 p-2">✕</button>
                </div>`).join('');
        }

        function remove(idx) { 
            cart.splice(idx,1); 
            document.getElementById('badge').innerText = cart.length; 
            if(cart.length===0) back(); else verCarrito(); 
        }

        function back() { 
            document.getElementById('p-carrito').classList.add('hidden'); 
            document.getElementById('p-catalogo').classList.remove('hidden'); 
        }

        function config() { 
            const p = prompt("Clave:"); 
            if(p==="1234") { 
                const u = prompt("URL Script:", scriptURL); 
                if(u) { localStorage.setItem('panchito_url', u.trim()); location.reload(); } 
            } 
        }

        async function sendOrder() {
            const btn = document.getElementById('btn-send');
            btn.innerText = "ENVIANDO..."; btn.disabled = true;
            try {
                await fetch(scriptURL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'text/plain' }, 
                    body: JSON.stringify({ vendedor: document.getElementById('user').value, carrito: cart }) 
                });[cite: 1, 2]
                alert("PEDIDO REGISTRADO");
                cart = []; location.reload();
            } catch(e) { 
                alert("Error al enviar"); 
                btn.innerText = "ENVIAR A PRODUCCIÓN"; btn.disabled = false; 
            }
        }
    </script>
</body>
</html>
