<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panchito Shoes App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">

    <header class="p-4 border-b border-orange-600 flex justify-between items-center bg-zinc-950">
        <h1 class="text-orange-600 font-black italic text-xl">PANCHITO SHOES</h1>
        <div class="flex gap-4">
            <button id="ver-carrito" class="relative text-2xl">🛒<span id="cant" class="absolute -top-1 -right-2 bg-orange-600 text-black text-[10px] font-bold px-1 rounded-full">0</span></button>
            <button id="abrir-ajustes" class="text-zinc-600">⚙️</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <!-- LOGIN -->
        <div id="v-login" class="mt-20 space-y-6 text-center">
            <input type="text" id="vendedor" placeholder="NOMBRE DEL VENDEDOR" class="w-full bg-zinc-900 border-b-2 border-orange-600 p-4 outline-none text-center font-bold">
            <button id="btn-entrar" class="w-full bg-orange-600 text-black font-black py-4 rounded-xl">ACCEDER AL CATALOGO</button>
        </div>

        <!-- CATALOGO -->
        <div id="v-catalogo" class="hidden grid grid-cols-2 gap-4"></div>

        <!-- CARRITO -->
        <div id="v-carrito" class="hidden space-y-4">
            <h2 class="text-orange-600 font-bold text-center">TUS PEDIDOS</h2>
            <div id="lista-pedido" class="space-y-2"></div>
            <button id="btn-enviar" class="w-full bg-orange-600 text-black font-black py-4 rounded-xl">CONFIRMAR PEDIDO</button>
            <button onclick="irACatalogo()" class="w-full text-zinc-500 text-sm py-2">Volver</button>
        </div>

        <!-- MODAL -->
        <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-end z-50">
            <div class="w-full p-6 bg-zinc-900 rounded-t-3xl border-t border-orange-600 space-y-4">
                <h3 id="mod-titulo" class="text-orange-600 font-bold text-xl uppercase"></h3>
                <div class="grid grid-cols-2 gap-2">
                    <select id="mod-talla" class="bg-black p-3 border border-zinc-800"></select>
                    <select id="mod-color" class="bg-black p-3 border border-zinc-800"></select>
                </div>
                <input type="number" id="mod-n" value="1" min="1" class="w-full bg-black p-3 text-center text-orange-600 font-bold">
                <button id="btn-add" class="w-full bg-orange-600 text-black font-black py-4 rounded-xl">AÑADIR</button>
                <button onclick="cerrarModal()" class="w-full text-zinc-500">Cerrar</button>
            </div>
        </div>
    </main>

    <script>
        var inventario = {};
        var carrito = [];
        var modeloActivo = "";

        // CONFIGURAR
        document.getElementById('abrir-ajustes').onclick = function() {
            var clave = prompt("Pass:");
            if(clave === "1234") {
                var url = prompt("Nueva URL de Google:", localStorage.getItem('url_panchito') || "");
                if(url) { localStorage.setItem('url_panchito', url.trim()); location.reload(); }
            }
        };

        // ENTRAR
        document.getElementById('btn-entrar').onclick = function() {
            var vend = document.getElementById('vendedor').value;
            var url = localStorage.getItem('url_panchito');
            if(!vend || !url) return alert("Faltan datos o URL");

            this.innerText = "CARGANDO...";
            fetch(url).then(r => r.json()).then(data => {
                inventario = data.productos;
                var grid = document.getElementById('v-catalogo');
                grid.innerHTML = "";
                Object.keys(inventario).forEach(key => {
                    var card = document.createElement('div');
                    card.className = "bg-zinc-900 p-2 border border-zinc-800 text-center rounded-lg";
                    card.innerHTML = '<img src="'+inventario[key].foto+'" class="h-32 w-full object-cover rounded mb-2"><p class="text-[10px] font-bold">'+key+'</p>';
                    card.onclick = () => {
                        modeloActivo = key;
                        document.getElementById('mod-titulo').innerText = key;
                        document.getElementById('mod-talla').innerHTML = inventario[key].tallas.map(t => '<option>'+t+'</option>').join('');
                        document.getElementById('mod-color').innerHTML = inventario[key].colores.map(c => '<option>'+c+'</option>').join('');
                        document.getElementById('modal').classList.remove('hidden');
                    };
                    grid.appendChild(card);
                });
                document.getElementById('v-login').classList.add('hidden');
                document.getElementById('v-catalogo').classList.remove('hidden');
            }).catch(e => { alert("Error de conexión"); this.innerText = "REINTENTAR"; });
        };

        // ACCIONES
        function cerrarModal() { document.getElementById('modal').classList.add('hidden'); }
        function irACatalogo() { document.getElementById('v-carrito').classList.add('hidden'); document.getElementById('v-catalogo').classList.remove('hidden'); }

        document.getElementById('btn-add').onclick = function() {
            carrito.push({ m: modeloActivo, t: document.getElementById('mod-talla').value, c: document.getElementById('mod-color').value, n: document.getElementById('mod-n').value, img: inventario[modeloActivo].foto });
            document.getElementById('cant').innerText = carrito.length;
            cerrarModal();
        };

        document.getElementById('ver-carrito').onclick = function() {
            if(carrito.length === 0) return alert("Carrito vacío");
            document.getElementById('v-catalogo').classList.add('hidden');
            document.getElementById('v-carrito').classList.remove('hidden');
            var list = document.getElementById('lista-pedido');
            list.innerHTML = "";
            carrito.forEach((item, i) => {
                var d = document.createElement('div');
                d.className = "bg-zinc-900 p-3 border border-zinc-800 flex justify-between";
                d.innerHTML = '<div><p class="font-bold text-xs">'+item.m+'</p><p class="text-[10px]">Talla '+item.t+' | '+item.n+' pares</p></div>';
                var del = document.createElement('button');
                del.innerText = "X";
                del.className = "text-orange-600 font-bold px-2";
                del.onclick = () => { carrito.splice(i,1); document.getElementById('cant').innerText = carrito.length; document.getElementById('ver-carrito').onclick(); };
                d.appendChild(del);
                list.appendChild(d);
            });
        };

        // ENVIAR
        document.getElementById('btn-enviar').onclick = function() {
            var url = localStorage.getItem('url_panchito');
            this.innerText = "ENVIANDO...";
            this.disabled = true;
            fetch(url, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ vendedor: document.getElementById('vendedor').value, carrito: carrito }) })
            .then(() => { alert("¡PEDIDO LISTO!"); location.reload(); })
            .catch(() => { alert("Error al enviar"); this.disabled = false; });
        };
    </script>
</body>
</html>
