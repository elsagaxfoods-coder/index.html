<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panchito Shoes - Panel de Ventas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .logo-img { width: 48px; height: 48px; object-fit: cover; border-radius: 50%; border: 2px solid #f97316; }
        .banner-img { width: 100%; height: 150px; object-fit: cover; border-radius: 16px; display: none; border: 1px solid #334155; }
        .bg-dark-app { background-color: #0f172a; }
        .card-dark { background-color: #1e293b; border: 1px solid #334155; }
        .btn-orange { background-color: #f97316; transition: all 0.2s ease; }
        .btn-orange:active { transform: scale(0.95); opacity: 0.8; }
        .text-orange { color: #f97316; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        /* Evitar zoom automático en iPhone al tocar inputs */
        input, select, textarea { font-size: 16px !important; }
    </style>
</head>
<body class="bg-dark-app text-slate-100 font-sans antialiased">

    <!-- HEADER -->
    <header class="bg-[#1e293b] shadow-xl sticky top-0 z-50 p-4 border-b border-slate-700">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img id="app-logo" src="" class="logo-img hidden" alt="Logo">
                <h1 class="font-black text-xl tracking-tighter text-white uppercase">Panchito<span class="text-orange">Shoes</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="verCarrito()" class="relative p-2 bg-slate-800 rounded-full border border-slate-600">
                    <span class="text-xl">🛒</span>
                    <span id="badge" class="absolute -top-1 -right-1 btn-orange text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center border-2 border-[#1e293b]">0</span>
                </button>
                <button onclick="config()" class="text-slate-500 hover:text-orange p-1 text-xl">⚙️</button>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-20">

        <!-- PANTALLA 1: LOGIN -->
        <section id="p-login" class="fade-in mt-10">
            <div class="card-dark rounded-3xl p-8 shadow-2xl text-center">
                <img id="login-logo" src="" class="w-24 h-24 mx-auto rounded-full mb-6 hidden border-2 border-orange shadow-lg shadow-orange-500/20">
                <h2 class="text-2xl font-bold mb-2">Bienvenido</h2>
                <p class="text-slate-400 text-sm mb-8">Ingresa tu nombre para comenzar</p>
                <input type="text" id="user" placeholder="Nombre del Vendedor" class="w-full bg-slate-900 border-2 border-slate-700 p-4 rounded-2xl mb-5 outline-none focus:border-orange text-white text-center font-bold">
                <button onclick="init()" id="btn-init" class="w-full btn-orange text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg">INGRESAR</button>
            </div>
        </section>

        <!-- PANTALLA 2: CATALOGO -->
        <section id="p-catalogo" class="hidden fade-in">
            <img id="app-banner" src="" class="banner-img shadow-2xl mb-6">
            
            <div class="card-dark rounded-3xl p-6 shadow-lg mb-6">
                <label class="block text-[10px] font-black text-orange uppercase tracking-[0.2em] mb-3 ml-1">Seleccionar Calzado</label>
                <select id="sel-modelo" onchange="loadOptions()" class="w-full p-4 bg-slate-900 border-2 border-slate-700 rounded-2xl outline-none focus:border-orange text-white mb-6 appearance-none">
                    <option value="">-- Listado de Modelos --</option>
                </select>

                <div id="options-area" class="hidden space-y-5 pt-6 border-t border-slate-700">
                    
                    <!-- SELECTOR DE TIPO -->
                    <div>
                        <span class="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-2 block">Tipo de Pedido</span>
                        <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-700">
                            <button onclick="setTipo('Normal')" id="btn-normal" class="flex-1 py-2 rounded-lg font-bold text-xs transition-all bg-orange text-white">NORMAL</button>
                            <button onclick="setTipo('Personalizado')" id="btn-perso" class="flex-1 py-2 rounded-lg font-bold text-xs transition-all text-slate-500">PERSONALIZADO</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <span class="text-[10px] font-bold text-slate-400 uppercase ml-2 block mb-1">Talla</span>
                            <select id="sel-talla" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-white"></select>
                        </div>
                        <div>
                            <span class="text-[10px] font-bold text-slate-400 uppercase ml-2 block mb-1">Color</span>
                            <select id="sel-color" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-white"></select>
                        </div>
                    </div>
                    <div>
                        <span class="text-[10px] font-bold text-slate-400 uppercase ml-2 block mb-1">Cantidad</span>
                        <input type="number" id="sel-cant" value="1" min="1" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl font-bold text-orange text-center text-lg">
                    </div>
                    <button onclick="addToCart()" class="w-full btn-orange text-white py-4 rounded-2xl font-black uppercase tracking-wide mt-4">AÑADIR AL CARRITO</button>
                </div>
            </div>
        </section>

        <!-- PANTALLA 3: CARRITO -->
        <section id="p-carrito" class="hidden fade-in">
            <div class="card-dark rounded-3xl p-6 shadow-2xl flex flex-col min-h-[480px]">
                <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-3">
                    <h2 class="text-xl font-black italic">RESUMEN</h2>
                    <span id="vendedor-label" class="text-orange text-xs font-bold uppercase"></span>
                </div>
                
                <div id="cart-list" class="flex-grow space-y-3 overflow-y-auto max-h-[350px]"></div>

                <div class="mt-8 space-y-4">
                    <button onclick="sendOrder()" id="btn-send" class="w-full bg-emerald-600 active:bg-emerald-700 text-white py-4 rounded-2xl font-black text-lg shadow-lg uppercase transition-all">ENVIAR PEDIDO</button>
                    <button onclick="back()" class="w-full text-slate-500 font-bold py-2 text-sm uppercase tracking-widest">← Seguir Comprando</button>
                </div>
            </div>
        </section>

    </main>

    <script>
        let scriptURL = localStorage.getItem('panchito_url') || "";
        let db = {};
        let cart = [];
        let tipoActual = "Normal";

        function setTipo(t) {
            tipoActual = t;
            document.getElementById('btn-normal').className = t === 'Normal' ? "flex-1 py-2 rounded-lg font-bold text-xs bg-orange text-white shadow-md" : "flex-1 py-2 rounded-lg font-bold text-xs text-slate-500";
            document.getElementById('btn-perso').className = t === 'Personalizado' ? "flex-1 py-2 rounded-lg font-bold text-xs bg-orange text-white shadow-md" : "flex-1 py-2 rounded-lg font-bold text-xs text-slate-500";
        }

        async function init() {
            const user = document.getElementById('user').value.trim();
            const btn = document.getElementById('btn-init');
            
            if(!user) return alert("Ingresa tu nombre");
            if(!scriptURL) return alert("Configura la URL del script en el engranaje ⚙️");

            btn.innerText = "CARGANDO...";
            btn.disabled = true;

            try {
                const r = await fetch(scriptURL, { redirect: "follow" });
                const data = await r.json();
                db = data.inventario;

                if(data.visuales) {
                    if(data.visuales.logo) {
                        document.getElementById('app-logo').src = document.getElementById('login-logo').src = data.visuales.logo;
                        document.getElementById('app-logo').classList.remove('hidden');
                        document.getElementById('login-logo').classList.remove('hidden');
                    }
                    if(data.visuales.banner) {
                        document.getElementById('app-banner').src = data.visuales.banner;
                        document.getElementById('app-banner').style.display = 'block';
                    }
                }

                const sel = document.getElementById('sel-modelo');
                sel.innerHTML = '<option value="">-- Listado de Modelos --</option>';
                Object.keys(db).forEach(m => sel.innerHTML += `<option value="${m}">${m}</option>`);

                document.getElementById('vendedor-label').innerText = user;
                document.getElementById('p-login').classList.add('hidden');
                document.getElementById('p-catalogo').classList.remove('hidden');
            } catch(e) {
                alert("Error de conexión. Revisa la URL del script.");
                btn.innerText = "INGRESAR";
                btn.disabled = false;
            }
        }

        function loadOptions() {
            const mod = document.getElementById('sel-modelo').value;
            const area = document.getElementById('options-area');
            if(!mod) return area.classList.add('hidden');
            
            document.getElementById('sel-talla').innerHTML = db[mod].tallas.map(t => `<option>${t}</option>`).join('');
            document.getElementById('sel-color').innerHTML = db[mod].colores.map(c => `<option>${c}</option>`).join('');
            area.classList.remove('hidden');
        }

        function addToCart() {
            cart.push({
                m: document.getElementById('sel-modelo').value,
                t: document.getElementById('sel-talla').value,
                c: document.getElementById('sel-color').value,
                n: document.getElementById('sel-cant').value,
                tipo: tipoActual
            });
            document.getElementById('badge').innerText = cart.length;
            document.getElementById('sel-modelo').value = "";
            document.getElementById('options-area').classList.add('hidden');
            setTipo('Normal');
            alert("Añadido al carrito");
        }

        function verCarrito() {
            if(cart.length === 0) return alert("Tu carrito está vacío");
            document.getElementById('p-catalogo').classList.add('hidden');
            document.getElementById('p-carrito').classList.remove('hidden');
            
            document.getElementById('cart-list').innerHTML = cart.map((i, idx) => `
                <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800 flex justify-between items-center animate-fadeIn">
                    <div>
                        <p class="font-bold text-white uppercase text-sm">${i.m} <span class="text-[10px] text-orange ml-1">[${i.tipo}]</span></p>
                        <p class="text-[11px] text-slate-400">Talla: ${i.t} | Color: ${i.c} | Cant: ${i.n}</p>
                    </div>
                    <button onclick="remove(${idx})" class="text-red-400 p-2 text-xl">✕</button>
                </div>`).join('');
        }

        function remove(idx) {
            cart.splice(idx, 1);
            document.getElementById('badge').innerText = cart.length;
            if(cart.length === 0) back(); else verCarrito();
        }

        function back() {
            document.getElementById('p-carrito').classList.add('hidden');
            document.getElementById('p-catalogo').classList.remove('hidden');
        }

        function config() {
            const p = prompt("Clave de configuración:");
            if(p === "1234") {
                const u = prompt("Pega la URL de tu Google Script (/exec):", scriptURL);
                if(u) {
                    localStorage.setItem('panchito_url', u.trim());
                    location.reload();
                }
            }
        }

        async function sendOrder() {
            const v = document.getElementById('user').value;
            const btn = document.getElementById('btn-send');
            
            if(cart.length === 0) return;
            
            btn.innerText = "ENVIANDO... ⏳";
            btn.disabled = true;

            try {
                // Usamos no-cors para maximizar compatibilidad con celulares
                await fetch(scriptURL, { 
                    method: "POST", 
                    mode: "no-cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({vendedor: v, carrito: cart}) 
                });
                
                alert("🚀 ¡PEDIDO ENVIADO CON ÉXITO!");
                cart = [];
                location.reload();
            } catch(e) {
                alert("Error al enviar. Intenta de nuevo.");
                btn.innerText = "ENVIAR PEDIDO";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
