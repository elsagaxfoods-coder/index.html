<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panchito Shoes App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white">

    <header class="p-4 bg-slate-800 flex justify-between items-center sticky top-0 z-50 border-b border-slate-700">
        <h1 class="font-bold uppercase">Panchito Shoes</h1>
        <div class="flex gap-4">
            <button id="btn-ver-carro" class="bg-slate-700 p-2 rounded-full relative">🛒 <span id="badge" class="text-orange-500 font-bold">0</span></button>
            <button id="btn-abrir-config" class="text-slate-500">⚙️</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <!-- VISTA LOGIN -->
        <div id="v-login" class="mt-10 space-y-4">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 text-center">
                <input type="text" id="nombre-usuario" placeholder="Tu nombre aquí" class="w-full p-4 bg-slate-900 rounded-lg border border-slate-700 mb-4 text-white outline-none">
                <button id="btn-entrar-app" class="w-full bg-orange-600 p-4 rounded-xl font-bold uppercase">Entrar</button>
            </div>
        </div>

        <!-- VISTA CATALOGO -->
        <div id="v-catalogo" class="hidden grid grid-cols-2 gap-4"></div>

        <!-- VISTA CARRITO -->
        <div id="v-carrito" class="hidden space-y-4">
            <div id="lista-pedido-final" class="space-y-2"></div>
            <button id="btn-enviar-datos" class="w-full bg-green-600 p-4 rounded-xl font-bold">ENVIAR PEDIDO</button>
            <button id="btn-volver-atras" class="w-full text-slate-500">Volver</button>
        </div>

        <!-- MODAL DE SELECCION -->
        <div id="v-modal" class="hidden fixed inset-0 bg-black/90 flex items-end z-[100]">
            <div class="bg-slate-800 w-full p-6 rounded-t-3xl space-y-4 shadow-2xl">
                <h2 id="modal-item-titulo" class="text-xl font-bold text-orange-500 uppercase"></h2>
                <select id="modal-sel-talla" class="w-full p-4 bg-slate-900 rounded-xl border border-slate-700 text-white"></select>
                <select id="modal-sel-color" class="w-full p-4 bg-slate-900 rounded-xl border border-slate-700 text-white"></select>
                <input type="number" id="modal-sel-cant" value="1" min="1" class="w-full p-4 bg-slate-900 rounded-xl text-center text-orange-500 font-bold text-xl">
                <button id="btn-confirmar-item" class="w-full bg-orange-600 p-4 rounded-xl font-bold">AÑADIR AL PEDIDO</button>
                <button id="btn-cerrar-modal" class="w-full text-slate-500 py-2">Cancelar</button>
            </div>
        </div>
    </main>

    <script>
        // ESTADO GLOBAL
        var dbApp = {};
        var miPedido = [];
        var itemActual = "";

        // CONFIGURACION (⚙️)
        document.getElementById('btn-abrir-config').onclick = function() {
            var clave = prompt("Clave:");
            if(clave === "1234") {
                var url = prompt("URL del Script:", localStorage.getItem('ps_url') || "");
                if(url) {
                    localStorage.setItem('ps_url', url.trim());
                    location.reload();
                }
            }
        };

        // CARGAR DATOS (ENTRAR)
        document.getElementById('btn-entrar-app').onclick = async function() {
            var user = document.getElementById('nombre-usuario').value;
            var scriptUrl = localStorage.getItem('ps_url');
            if(!user || !scriptUrl) return alert("Falta nombre o configurar URL en ⚙️");

            this.innerText = "CONECTANDO...";
            try {
                var res = await fetch(scriptUrl);
                var data = await res.json();
                dbApp = data.inventario;[cite: 1, 2]
                
                var grid = document.getElementById('v-catalogo');
                grid.innerHTML = "";
                Object.keys(dbApp).forEach(function(key) {
                    var card = document.createElement('div');
                    card.className = "bg-slate-800 p-2 rounded-xl border border-slate-700 text-center cursor-pointer active:scale-95 transition-transform";
                    card.innerHTML = '<img src="'+dbApp[key].foto+'" class="h-32 w-full object-cover rounded-lg mb-2"><p class="text-[10px] uppercase font-bold truncate">'+key+'</p>';
                    card.onclick = function() { abrirModal(key); };
                    grid.appendChild(card);
                });[cite: 2]

                document.getElementById('v-login').classList.add('hidden');
                document.getElementById('v-catalogo').classList.remove('hidden');
            } catch(e) {
                alert("Error de conexión. Revisa la URL.");
                this.innerText = "Entrar";
            }
        };

        function abrirModal(nombre) {
            itemActual = nombre;
            document.getElementById('modal-item-titulo').innerText = nombre;
            document.getElementById('modal-sel-talla').innerHTML = dbApp[nombre].tallas.map(function(t){ return '<option>'+t+'</option>'; }).join('');
            document.getElementById('modal-sel-color').innerHTML = dbApp[nombre].colores.map(function(c){ return '<option>'+c+'</option>'; }).join('');
            document.getElementById('v-modal').classList.remove('hidden');
        }

        document.getElementById('btn-cerrar-modal').onclick = function() { document.getElementById('v-modal').classList.add('hidden'); };

        document.getElementById('btn-confirmar-item').onclick = function() {
            miPedido.push({
                m: itemActual,
                t: document.getElementById('modal-sel-talla').value,
                c: document.getElementById('modal-sel-color').value,
                n: document.getElementById('modal-sel-cant').value,
                tipo: "Normal",
                img: dbApp[itemActual].foto
            });
            document.getElementById('badge').innerText = miPedido.length;
            document.getElementById('v-modal').classList.add('hidden');
        };

        // CARRITO
        document.getElementById('btn-ver-carro').onclick = function() {
            if(miPedido.length === 0) return alert("Vacío");
            document.getElementById('v-catalogo').classList.add('hidden');
            document.getElementById('v-carrito').classList.remove('hidden');
            var lista = document.getElementById('lista-pedido-final');
            lista.innerHTML = "";
            miPedido.forEach(function(item, idx) {
                var div = document.createElement('div');
                div.className = "bg-slate-800 p-3 rounded-xl border border-slate-700 flex justify-between items-center";
                div.innerHTML = '<div><p class="text-xs font-bold uppercase">'+item.m+'</p><p class="text-[10px] text-slate-400">Talla '+item.t+' | Cant: '+item.n+'</p></div>';
                var btnB = document.createElement('button');
                btnB.innerText = "✕";
                btnB.className = "text-red-500 px-2";
                btnB.onclick = function() {
                    miPedido.splice(idx, 1);
                    document.getElementById('badge').innerText = miPedido.length;
                    if(miPedido.length === 0) volverCatalogo(); else document.getElementById('btn-ver-carro').onclick();
                };
                div.appendChild(btnB);
                lista.appendChild(div);
            });
        };

        function volverCatalogo() {
            document.getElementById('v-carrito').classList.add('hidden');
            document.getElementById('v-catalogo').classList.remove('hidden');
        }
        document.getElementById('btn-volver-atras').onclick = volverCatalogo;

        // ENVIAR POST[cite: 1]
        document.getElementById('btn-enviar-datos').onclick = async function() {
            var url = localStorage.getItem('ps_url');
            this.innerText = "ENVIANDO...";
            this.disabled = true;
            try {
                await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        vendedor: document.getElementById('nombre-usuario').value,
                        carrito: miPedido
                    })
                });[cite: 1, 2]
                alert("PEDIDO REGISTRADO");
                location.reload();
            } catch(e) {
                alert("Error al enviar");
                this.innerText = "ENVIAR PEDIDO";
                this.disabled = false;
            }
        };
    </script>
</body>
</html>
