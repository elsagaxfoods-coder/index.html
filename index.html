<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panchito Shoes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .logo-sticky { width: 50px; height: 50px; object-fit: cover; border-radius: 50%; border: 2px solid #3b82f6; }
        .banner-publicitario { width: 100%; max-height: 150px; object-fit: cover; border-radius: 12px; display: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div class="max-w-md mx-auto min-h-screen flex flex-col">
        
        <!-- HEADER (LOGO SIEMPRE VISIBLE) -->
        <div class="flex justify-between items-center bg-white p-4 shadow-md sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <img id="global-logo" src="" alt="Logo" class="logo-sticky hidden">
                <h1 class="text-xl font-black text-blue-700">PANCHITO</h1>
            </div>
            <div class="flex gap-4 items-center">
                <button onclick="verCarrito()" class="relative bg-blue-100 p-2 rounded-full">
                    🛒 <span id="cont" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">0</span>
                </button>
                <button onclick="menuConfig()" class="text-xl text-gray-400">⚙️</button>
            </div>
        </div>

        <!-- PANTALLA 1: LOGIN -->
        <div id="p-login" class="flex-grow flex flex-col items-center justify-center p-6">
            <img id="login-logo" src="" class="w-32 h-32 rounded-full mb-6 shadow-lg hidden">
            <div class="bg-white p-8 rounded-2xl shadow-xl w-full text-center border">
                <h2 class="text-gray-500 mb-4 uppercase tracking-widest text-sm font-bold">Identificación</h2>
                <input type="text" id="vendedor" placeholder="Tu nombre" class="w-full p-4 border-2 rounded-xl mb-4 outline-none focus:border-blue-500">
                <button onclick="entrar()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-transform">
                    INGRESAR
                </button>
            </div>
        </div>

        <!-- PANTALLA 2: CATÁLOGO -->
        <div id="p-catalogo" class="hidden p-4 animate-fadeIn">
            <!-- BANNER DINÁMICO -->
            <img id="banner-publicitario" src="" alt="Publicidad" class="banner-publicitario mb-6 shadow-md">

            <div class="bg-white p-6 rounded-2xl shadow border mb-6">
                <label class="block text-gray-700 font-bold mb-2 uppercase text-xs">Selecciona Modelo:</label>
                <select id="selector-modelo" onchange="actualizarOpciones()" class="w-full p-4 bg-gray-50 border-2 rounded-xl mb-4 outline-none focus:border-blue-500">
                    <option value="">-- Elige un calzado --</option>
                </select>

                <div id="opciones-modelo" class="hidden space-y-4 border-t pt-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">Talla</label>
                            <select id="t-sel" class="w-full p-3 border rounded-lg bg-white"></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">Color</label>
                            <select id="c-sel" class="w-full p-3 border rounded-lg bg-white"></select>
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Cantidad</label>
                        <input type="number" id="n-sel" value="1" min="1" class="w-full p-3 border rounded-lg bg-white">
                    </div>
                    <button onclick="add()" class="w-full bg-yellow-500 text-white py-4 rounded-xl font-bold shadow-md active:bg-yellow-600">
                        AGREGAR AL PEDIDO
                    </button>
                </div>
            </div>
        </div>

        <!-- PANTALLA 3: CARRITO -->
        <div id="p-carrito" class="hidden p-4 flex-grow">
            <div class="bg-white p-6 rounded-2xl shadow-xl border flex flex-col h-full">
                <h2 class="text-xl font-black mb-6 border-b pb-2">MI PEDIDO</h2>
                <div id="items-car" class="flex-grow space-y-4 overflow-y-auto"></div>
                <div class="mt-6">
                    <button onclick="enviarPedido()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg">ENVIAR A EXCEL</button>
                    <button onclick="volver()" class="w-full text-gray-500 py-4 font-medium">← Volver al catálogo</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let urlScript = localStorage.getItem('panchito_url') || "";
        let inventario = {};
        let carrito = [];

        function entrar() {
            const v = document.getElementById('vendedor').value;
            if(!v) return alert("Ingresa tu nombre");
            if(!urlScript) return alert("Falta configurar la URL");

            fetch(urlScript)
                .then(r => r.json())
                .then(data => {
                    inventario = data.inventario;

                    // Cargar imágenes desde Google Sheets
                    if(data.visuales.logo) {
                        const logoG = document.getElementById('global-logo');
                        const logoL = document.getElementById('login-logo');
                        logoG.src = logoL.src = data.visuales.logo;
                        logoG.classList.remove('hidden');
                        logoL.classList.remove('hidden');
                    }
                    if(data.visuales.banner) {
                        const ban = document.getElementById('banner-publicitario');
                        ban.src = data.visuales.banner;
                        ban.style.display = 'block';
                    }

                    // Llenar modelos
                    const selector = document.getElementById('selector-modelo');
                    selector.innerHTML = '<option value="">-- Elige un calzado --</option>';
                    Object.keys(inventario).forEach(m => {
                        selector.innerHTML += `<option value="${m}">${m}</option>`;
                    });

                    document.getElementById('p-login').classList.add('hidden');
                    document.getElementById('p-catalogo').classList.remove('hidden');
                })
                .catch(e => alert("Error al conectar. Revisa la URL y las imágenes."));
        }

        function actualizarOpciones() {
            const mod = document.getElementById('selector-modelo').value;
            const panel = document.getElementById('opciones-modelo');
            if(!mod) return panel.classList.add('hidden');

            const d = inventario[mod];
            document.getElementById('t-sel').innerHTML = d.tallas.map(t => `<option>${t}</option>`).join('');
            document.getElementById('c-sel').innerHTML = d.colores.map(c => `<option>${c}</option>`).join('');
            panel.classList.remove('hidden');
        }

        function add() {
            const m = document.getElementById('selector-modelo').value;
            const t = document.getElementById('t-sel').value;
            const c = document.getElementById('c-sel').value;
            const n = document.getElementById('n-sel').value;
            carrito.push({m, t, c, n});
            document.getElementById('cont').innerText = carrito.length;
            alert("¡Agregado!");
            document.getElementById('selector-modelo').value = "";
            document.getElementById('opciones-modelo').classList.add('hidden');
        }

        function verCarrito() {
            if(carrito.length === 0) return alert("Vacío");
            document.getElementById('p-catalogo').classList.add('hidden');
            document.getElementById('p-carrito').classList.remove('hidden');
            document.getElementById('items-car').innerHTML = carrito.map((i, x) => `
                <div class="flex justify-between items-center p-3 border-b">
                    <div><b>${i.m}</b><br><small>T:${i.t} C:${i.c} x${i.n}</small></div>
                    <button onclick="borrar(${x})" class="text-red-500">❌</button>
                </div>`).join('');
        }

        function borrar(x) {
            carrito.splice(x, 1);
            document.getElementById('cont').innerText = carrito.length;
            if(carrito.length === 0) volver(); else verCarrito();
        }

        function volver() {
            document.getElementById('p-carrito').classList.add('hidden');
            document.getElementById('p-catalogo').classList.remove('hidden');
        }

        function menuConfig() {
            const p = prompt("Clave:");
            if(p === "1234") {
                const u = prompt("URL Script:", urlScript);
                if(u) { localStorage.setItem('panchito_url', u.trim()); location.reload(); }
            }
        }

        async function enviarPedido() {
            const v = document.getElementById('vendedor').value;
            await fetch(urlScript, {method:"POST", mode:"no-cors", body: JSON.stringify({vendedor:v, carrito:carrito})});
            alert("PEDIDO ENVIADO");
            location.reload();
        }
    </script>
</body>
</html>
